name: Windows release

# Builds the Windows desktop bundle on a windows-latest runner (the MSVC C++
# toolchain and Rust x86_64-pc-windows-msvc only exist on Windows, so this can't
# be produced from a Linux dev box). Uploads a zipped Release/ folder as a build
# artifact; a separate, permission-scoped job attaches it to a GitHub Release
# when a v* tag is pushed.
#
# Actions are pinned to commit SHAs (not mutable tags) as a supply-chain measure.

on:
  workflow_dispatch:
  push:
    tags: ['v*']
  pull_request:
    paths:
      - 'flutter/**'
      - '.github/workflows/windows-release.yml'

# Least privilege by default; the release job opts into more where it needs it.
permissions:
  contents: read

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      # This repo -> <workspace>/Lattice-Clients
      - name: Checkout Lattice-Clients
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          path: Lattice-Clients

      # The Lattice framework is a sibling path dependency:
      #   flutter/rust/lattice-mobile/Cargo.toml -> ../../../../Lattice/crates/lattice
      # Checking it out to <workspace>/Lattice reproduces the local sibling layout,
      # so the existing relative path resolves unchanged. Pinned to the exact commit
      # the clients depend on (ConnHandle::link()) for reproducible builds.
      - name: Checkout Lattice framework
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          repository: imcmurray/lattice
          path: Lattice
          ref: 78f28fb

      - name: Set up Rust (MSVC target)
        uses: dtolnay/rust-toolchain@fa04a1451ff1842e2626ccb99004d0195b455a88 # master
        with:
          toolchain: stable
          targets: x86_64-pc-windows-msvc

      - name: Cache cargo
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            Lattice-Clients/flutter/rust/target
          key: cargo-windows-${{ hashFiles('Lattice-Clients/flutter/rust/**/Cargo.lock', 'Lattice/**/Cargo.toml') }}

      - name: Set up Flutter
        uses: subosito/flutter-action@1a449444c387b1966244ae4d4f8c696479add0b2 # v2
        with:
          channel: stable
          cache: true

      - name: Enable Windows desktop
        run: flutter config --enable-windows-desktop

      - name: flutter pub get
        working-directory: Lattice-Clients/flutter
        run: flutter pub get

      - name: Build Windows (release)
        working-directory: Lattice-Clients/flutter
        run: flutter build windows --release

      - name: Package bundle
        working-directory: Lattice-Clients/flutter
        shell: pwsh
        run: |
          $src = "build/windows/x64/runner/Release"
          Compress-Archive -Path "$src/*" -DestinationPath "lattice-node-windows-x64.zip" -Force

      - name: Upload build artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: lattice-node-windows-x64
          path: Lattice-Clients/flutter/lattice-node-windows-x64.zip
          if-no-files-found: error

  # Isolated so only this job holds write scope, and only on tag pushes.
  release:
    needs: build-windows
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download artifact
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: lattice-node-windows-x64
      - name: Attach to Release
        uses: softprops/action-gh-release@3bb12739c298aeb8a4eeaf626c5b8d85266b0e65 # v2
        with:
          files: lattice-node-windows-x64.zip
